name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install ruff mypy -r backend/requirements.txt
      - run: ruff check backend
      - run: mypy backend
      - run: cd frontend && npm install
      - run: cd frontend && npx tsc --noEmit

  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-asyncio httpx aiosqlite -r backend/requirements.txt
      - run: pytest -m "unit"

  test-integration:
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-asyncio httpx aiosqlite -r backend/requirements.txt
      - run: pytest -m "integration"

  test-frontend:
    runs-on: ubuntu-latest
    needs: test-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm install
      - run: cd frontend && npx vitest run --coverage

  test-e2e:
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: docker-compose up -d --build
      - run: cd frontend && npm install
      - run: npx playwright test --config tests/e2e/fixtures/playwright.config.ts
      - run: docker-compose down
