[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short --strict-markers
markers =
  unit: testes unitarios sem I/O externo
  integration: testes com banco SQLite em memoria
  e2e: testes end-to-end com stack completa
